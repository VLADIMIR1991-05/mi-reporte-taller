<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Validador de Despiece - Madeval</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .header { background: var(--primary); color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .controls { background: white; padding: 20px; border-radius: 8px; display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .f-input { padding: 12px; border: 1px solid #ddd; border-radius: 4px; flex: 1; min-width: 150px; }
        button { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .mueble-container { background: white; padding: 20px; margin-bottom: 20px; border-left: 8px solid #ccc; border-radius: 8px; }
        .mueble-container.err { border-left-color: #e74c3c; background: #fff5f5; }
        .mueble-container.ok { border-left-color: #27ae60; background: #f0fff4; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 10px; font-size: 11px; text-transform: uppercase; }
        td { padding: 8px; border-bottom: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Validador de Despiece</h1>
        <input type="file" id="upload" accept=".xlsx, .csv">
    </div>

    <div class="controls">
        <input type="text" class="f-input" onkeyup="filtrar()" placeholder="Filtro de búsqueda...">
        <button onclick="validarTodo()">VALIDAR ESTRUCTURA</button>
    </div>

    <div id="lista"></div>

    <script>
        document.getElementById('upload').addEventListener('change', function(e) {
            let reader = new FileReader();
            reader.onload = (event) => {
                let wb = XLSX.read(new Uint8Array(event.target.result), {type: 'array'});
                let json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                renderizar(json);
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function renderizar(data) {
            let lista = document.getElementById('lista');
            lista.innerHTML = "";
            let codigos = [...new Set(data.map(r => r.cod_mueble))];
            
            codigos.forEach(cod => {
                let items = data.filter(r => r.cod_mueble == cod);
                let div = document.createElement('div');
                div.className = 'mueble-container';
                div.innerHTML = `<h2>${cod}</h2>
                    <table>
                        <tr><th>Pieza</th><th>M1</th><th>M2</th></tr>
                        ${items.map(r => `<tr><td>${r.cod_pieza||''}</td><td class='med1'>${r.medida1||0}</td><td class='med2'>${r.medida2||0}</td></tr>`).join('')}
                    </table>`;
                lista.appendChild(div);
            });
        }

        function validarTodo() {
            document.querySelectorAll('.mueble-container').forEach(div => {
                let error = false;
                let codMueble = div.querySelector('h2').innerText;
                let tipo = codMueble[0]; // A, B, S, X, E
                
                // Calcular Ancho Total
                let match = codMueble.match(/[A-Z](\d+)/);
                let anchoTotal = match ? parseInt(match[1]) * 10 : 0;
                
                // Definir Profundidad Esperada (Estructura - 20mm puerta)
                let prof = (tipo === 'A') ? 320 : (tipo === 'S') ? 530 : 580;

                div.querySelectorAll('tr').forEach(tr => {
                    let textoFila = tr.innerText;
                    let p = tr.cells[0]?.innerText.toUpperCase() || "";
                    let m1 = parseInt(tr.cells[1]?.innerText) || 0;
                    let m2 = parseInt(tr.cells[2]?.innerText) || 0;

                    // Lógica dinámica de espesor: Si la fila menciona "15", descuento 31mm, si no, 37mm
                    let es15 = textoFila.includes('15');
                    let descuento = es15 ? 31 : 37;

                    // 1. Validar Bases, Techos, Ajustes (Ancho - Descuento)
                    if (p.includes('BASE') || p.includes('TECHO') || p.includes('AJ_')) {
                        let target = anchoTotal - descuento;
                        if (m1 !== target && m2 !== target) error = true;
                    }

                    // 2. Validar Profundidad (Laterales, Bases, Techos, Ajustes)
                    if (p.includes('AJ_') || p.includes('BAS') || p.includes('TEC') || p.startsWith('L')) {
                        if (m1 !== prof && m2 !== prof) error = true;
                    }
                });

                div.className = 'mueble-container ' + (error ? 'err' : 'ok');
            });
        }

        function filtrar() {
            let val = document.querySelector('.f-input').value.toUpperCase();
            document.querySelectorAll('.mueble-container').forEach(div => {
                div.style.display = div.innerText.includes(val) ? "" : "none";
            });
        }
    </script>
</body>
</html>
