        // Maneja la carga del segundo archivo y ejecuta la comparacion.
        function manejarArchivoComparar(event) {
            // Toma el archivo seleccionado.
            const file = event.target.files[0];

            // Si no hay archivo o falta base, termina.
            if (!file || DATA_BASE_COMPARACION.length === 0) return;

            // Mensaje de espera.
            compareResultEl.textContent = "Comparando archivos...";

            // Lee segundo archivo.
            leerArchivoComoData(file)
                .then(data => {
                    DATA_ARCHIVO_COMPARAR = data;
                    MAPA_ARCHIVO_COMPARAR = data.length > 0 ? crearMapaColumnas(Object.keys(data[0]), data) : {};
                    const resultado = compararArchivos(DATA_BASE_COMPARACION, MAPA_BASE_COMPARACION, DATA_ARCHIVO_COMPARAR, MAPA_ARCHIVO_COMPARAR);
                    mostrarResultadoComparacion(resultado, file.name);
                })
                .catch(error => {
                    compareResultEl.textContent = "No se pudo leer el archivo a comparar.";
                    console.error(error);
                });
        }

        // Compara dos archivos por piezas y medidas principales.
        function compararArchivos(baseRows, baseMap, compareRows, compareMap) {
            // Crea indices de ambos archivos.
            const baseIndex = crearIndiceComparacion(baseRows, baseMap);
            const compareIndex = crearIndiceComparacion(compareRows, compareMap);

            // Listas de resultado.
            const faltan = [];
            const sobran = [];
            const cambiadas = [];

            // Revisa piezas del archivo base contra el segundo.
            baseIndex.forEach((baseItem, key) => {
                const compareItem = compareIndex.get(key);
                if (!compareItem) {
                    faltan.push(baseItem);
                    return;
                }
                if (baseItem.firma !== compareItem.firma) {
                    cambiadas.push({ base: baseItem, comparar: compareItem });
                }
            });

            // Revisa piezas nuevas del segundo archivo.
            compareIndex.forEach((compareItem, key) => {
                if (!baseIndex.has(key)) sobran.push(compareItem);
            });

            // Devuelve resumen.
            return {
                baseTotal: baseRows.length,
                compararTotal: compareRows.length,
                faltan,
                sobran,
                cambiadas
            };
        }

        // Crea indice para comparar piezas.
        function crearIndiceComparacion(rows, mapa) {
            // Mapa final.
            const index = new Map();

            // Cuenta repeticiones por clave para manejar piezas duplicadas.
            const repetidos = new Map();

            // Recorre cada fila.
            rows.forEach((row, idx) => {
                const item = crearItemComparacion(row, mapa, idx + 1);
                const key = item.key;

                // Agrega sufijo por repeticion para no pisar filas duplicadas.
                const repeticion = (repetidos.get(key) || 0) + 1;
                repetidos.set(key, repeticion);
                const finalKey = repeticion > 1 ? `${key}#${repeticion}` : key;
                index.set(finalKey, item);
            });

            // Devuelve indice.
            return index;
        }

        // Crea una fila normalizada para comparar.
        function crearItemComparacion(row, mapa, fila) {
            // Identidad de pieza.
            const op = valConMapa(row, "op", mapa) || "Sin OP";
            const codMueble = valConMapa(row, "cod_mueble", mapa) || "Sin codigo";
            const codPieza = valConMapa(row, "cod_pieza", mapa) || "Sin pieza";
            const nomueble = valConMapa(row, "nomueble", mapa);
            const jov = valConMapa(row, "jov", mapa);

            // Valores que deben coincidir.
            const valores = ["cant_piezas", "medida1", "medida2", "l1", "l2", "c1", "c2"]
                .map(col => `${col}:${valConMapa(row, col, mapa)}`)
                .join("|");

            // Devuelve objeto comparativo.
            return {
                fila,
                key: [op, codMueble, codPieza, nomueble, jov].map(normalizarComparacion).join("|"),
                firma: valores,
                etiqueta: `OP ${op} - ${codMueble} - ${codPieza}${nomueble ? ` - ${formatearUbicacion(nomueble)}` : ""}`
            };
        }

        // Normaliza texto para comparar.
        function normalizarComparacion(value) {
            // Convierte a texto uniforme.
            return String(value || "").toUpperCase().trim().replace(/\s+/g, " ");
        }

        // Muestra resumen y detalles de comparacion.
        function mostrarResultadoComparacion(resultado, nombreArchivo) {
            // Crea texto resumen.
            compareResultEl.textContent = `Comparado con ${nombreArchivo}: ${resultado.faltan.length} faltan, ${resultado.sobran.length} sobran, ${resultado.cambiadas.length} cambiadas. Piezas base: ${resultado.baseTotal}. Piezas comparadas: ${resultado.compararTotal}.`;

            // Limpia avisos anteriores.
            limpiarAvisos();

            // Crea detalle breve en la zona superior de resultados.
            const detalle = crearElemento("div", "notice");
            const partes = [];
            partes.push(`Comparacion: ${resultado.faltan.length} faltan, ${resultado.sobran.length} sobran, ${resultado.cambiadas.length} cambiadas.`);
            partes.push(...resultado.faltan.slice(0, 8).map(item => `Falta: ${item.etiqueta}`));
            partes.push(...resultado.sobran.slice(0, 8).map(item => `Sobra: ${item.etiqueta}`));
            partes.push(...resultado.cambiadas.slice(0, 8).map(item => `Cambia: ${item.base.etiqueta}`));

            // Agrega nota si hay mas detalles.
            const totalDetalles = resultado.faltan.length + resultado.sobran.length + resultado.cambiadas.length;
            if (totalDetalles > 24) partes.push(`Hay ${totalDetalles - 24} diferencias adicionales no mostradas en este resumen.`);

            // Inserta detalle como texto.
            detalle.textContent = partes.join(" | ");
            avisosEl.appendChild(detalle);
        }

        // Descifra el codigo escrito en el consultor independiente.
        function consultarCodigoMueble() {
            // Lee el codigo escrito.
            const codigo = document.getElementById("codigo-consulta").value.trim();

            // Busca el contenedor de resultado.
            const resultado = document.getElementById("resultado-codigo");

            // Si no hay codigo, muestra mensaje inicial.
            if (!codigo) {
                resultado.textContent = "Escribe un codigo para ver como se lee.";
                return;
            }

            // Muestra la lectura usando el mismo traductor de las tarjetas.
            resultado.textContent = obtenerNombre(codigo);
        }

        // Obtiene el primer valor no vacio de una lista de columnas posibles.
        function obtenerPrimerValor(items, columnas) {
            // Recorre filas del mueble.
            for (const row of items) {
                // Recorre columnas candidatas.
                for (const col of columnas) {
                    // Lee el valor con el mapeo normal.
                    const value = val(row, col);

                    // Devuelve el primer valor util.
                    if (value) return value;
                }
            }

            // Si no encuentra nada, devuelve vacio.
            return "";
        }

        // Da formato uniforme a la ubicacion junto al codigo del mueble.
        function formatearUbicacion(ubicacion) {
            // Convierte a texto limpio.
            let texto = String(ubicacion || "").trim();

            // Quita la palabra Ubi si venia en el archivo.
            texto = texto.replace(/^ubi\s*/i, "").trim();

            // Si viene solo numero, lo muestra como referencia de columna C.
            if (/^\d+$/.test(texto)) texto = `C${texto}`;

            // Muestra solo la ubicacion entre parentesis.
            return texto ? `(${texto})` : "";
        }

        // Valida la estructura de todos los muebles renderizados.
        function validarTodo() {
            // Marca que la vista ya fue validada.
            VALIDADO = true;
            INDICE_ERROR_ACTUAL = -1;

            // Contadores de resultado.
            let countOk = 0;
            let countErr = 0;

            // Recorre cada tarjeta de mueble.
            document.querySelectorAll(".mueble-container").forEach(card => {
                // Limpia estado anterior.
                limpiarEstadoValidacion(card);

                // Ejecuta validacion de una tarjeta.
                const errores = validarMueble(card);

                // Aplica estado visual segun resultado.
                if (errores.length > 0) {
                    card.classList.add("err");
                    mostrarErroresEnTarjeta(card, errores);
                    countErr++;
                } else {
                    card.classList.add("ok");
                    countOk++;
                }

                // Actualiza badge de estado.
                actualizarBadgeEstado(card, errores.length === 0);
            });

            // Actualiza chips de resumen.
            chipOkEl.textContent = `${countOk} OK`;
            chipErrEl.textContent = `${countErr} con errores`;
            chipOkEl.style.display = countOk > 0 ? "" : "none";
            chipErrEl.style.display = countErr > 0 ? "" : "none";
            chipErrEl.style.cursor = countErr > 0 ? "pointer" : "";
            chipErrEl.title = countErr > 0 ? "Click para ir al siguiente mueble con falla" : "";
        }

        // Salta al siguiente mueble con falla cada vez que se pulsa el contador de errores.
        function irAlSiguienteError() {
            const errores = Array.from(document.querySelectorAll(".mueble-container.err"))
                .filter(card => card.offsetParent !== null);

            if (errores.length === 0) return;

            INDICE_ERROR_ACTUAL = (INDICE_ERROR_ACTUAL + 1) % errores.length;
            const destino = errores[INDICE_ERROR_ACTUAL];

            destino.scrollIntoView({ behavior: "smooth", block: "center" });
            destino.classList.add("pulse-error");
            window.setTimeout(() => destino.classList.remove("pulse-error"), 900);
        }

        // Valida un solo mueble y devuelve lista de errores.
        function validarMueble(card) {
            // Guarda errores encontrados.
            const errores = [];

            // Lee codigo del mueble.
            const cod = (card.dataset.codpuro || "").toUpperCase();

            // Lee ancho detectado desde el codigo.
            const ancho = Number.parseInt(card.dataset.ancho, 10) || 0;

            // Lee alto y profundidad interpretadas desde el codigo.
            const alto = Number.parseInt(card.dataset.alto, 10) || 0;
            const profundidadBase = Number.parseInt(card.dataset.profundidadEstructura, 10) || Number.parseInt(card.dataset.profundidad, 10) || 0;
            const tieneTpm = card.dataset.tpm === "1";
            const profundidad = profundidadBase;

            // Lee el grosor del material definido desde piezas estructurales.
            const grosor = obtenerGrosorMaterialDesdeCard(card);

            // Calcula ancho interno de base/techo/ajustes.
            const anchoInterno = ancho > 0 ? ancho - (grosor * 2) - 1 : 0;

            // Si no hay ancho y alto, no se puede comparar el despiece con seguridad.
            if (!ancho || !alto) {
                errores.push(`No he podido validar "${cod}" porque no pude detectar ancho y alto suficientes desde el codigo del mueble.`);
                return errores;
            }

            // Recorre filas de piezas.
            card.querySelectorAll("tbody tr").forEach((tr, index) => {
                // Toma los valores principales de la fila.
                const pieza = textoCelda(tr, "cod_pieza").toUpperCase();
                const medida1 = numeroCelda(tr, "medida1");
                const medida2 = numeroCelda(tr, "medida2");
                const numeroFila = index + 1;

                // Si no hay codigo de pieza, no valida esa fila.
                if (!pieza) return;

                // Indica si esta fila tiene error.
                let filaConError = false;

                // Valida medidas principales segun pieza y descripcion del modulo.
                const validacion = validarMedidasPieza(pieza, medida1, medida2, {
                    ancho,
                    alto,
                    profundidad,
                    grosor,
                    anchoInterno,
                    tieneTpm
                });

                if (!validacion.ok) {
                    errores.push(`Fila ${numeroFila}: ${pieza} ${validacion.mensaje} Medidas encontradas: ${formatearMedida(medida1)} x ${formatearMedida(medida2)} mm.`);
                    filaConError = true;
                }

                // Marca con check pequeno las filas y medidas que realmente fueron comparadas.
                if (validacion.valida) {
                    marcarFilaValidada(tr);
                    marcarMedidasValidas(tr, validacion.objetivos || []);
                }

                // Marca visualmente la fila si fallo alguna regla.
                if (filaConError) tr.classList.add("row-error");
                else tr.classList.add("row-ok");
            });

            // Devuelve todos los errores encontrados.
            return errores;
        }

        // Limpia clases y mensajes de una validacion anterior.
        function limpiarEstadoValidacion(card) {
            // Quita clases de estado.
            card.classList.remove("err", "ok");

            // Quita marcas de filas con error.
            card.querySelectorAll(".row-error").forEach(row => row.classList.remove("row-error"));

            // Quita marcas de filas validadas correctamente.
            card.querySelectorAll(".row-ok").forEach(row => row.classList.remove("row-ok"));

            // Quita checks de comparacion anterior.
            card.querySelectorAll(".row-check").forEach(check => check.remove());

            // Quita checks de medidas coincidentes anteriores.
            card.querySelectorAll(".measure-check").forEach(check => check.remove());

            // Limpia lista de errores.
            const validationList = card.querySelector(".validation-list");
            validationList.textContent = "";
            validationList.classList.remove("show");

            // Quita badge de estado anterior.
            const existingBadge = card.querySelector(".badge-status");
            if (existingBadge) existingBadge.remove();
        }

        // Muestra errores dentro de la tarjeta.
        function mostrarErroresEnTarjeta(card, errores) {
            // Busca la caja de validacion.
            const validationList = card.querySelector(".validation-list");

            // Crea una lista para los errores.
            const ul = document.createElement("ul");

            // Agrega cada error como item.
            errores.forEach(error => {
                const li = document.createElement("li");
                li.textContent = error;
                ul.appendChild(li);
            });

            // Inserta lista en la caja.
            validationList.appendChild(ul);

            // Muestra la caja.
            validationList.classList.add("show");
        }

        // Actualiza el badge OK/Error de una tarjeta.
        function actualizarBadgeEstado(card, ok) {
            // Busca contenedor de badges.
            const badgesEl = card.querySelector(".badges");

            // Crea badge nuevo.
            const badge = document.createElement("span");

            // Asigna clases segun estado.
            badge.className = `badge ${ok ? "badge-ok" : "badge-err"} badge-status`;

            // Asigna texto visible.
            badge.textContent = ok ? "OK" : "Error";

            // Agrega badge a la tarjeta.
            badgesEl.appendChild(badge);
        }

        // Agrega un check pequeno a la primera celda de una fila validada.
        function marcarFilaValidada(tr) {
            const cell = tr.querySelector('[data-col="__check"]');
            if (!cell || cell.querySelector(".row-check")) return;

            const check = document.createElement("span");
            check.className = "row-check";
            check.title = "Fila comparada";
            cell.appendChild(check);
        }

        // Agrega checks junto a MEDIDA1/MEDIDA2 cuando coinciden con valores esperados.
        function marcarMedidasValidas(tr, objetivos) {
            const valores = objetivos.filter(valor => Number.isFinite(valor) && valor > 0);
            if (valores.length === 0) return;

            ["medida1", "medida2"].forEach(col => {
                const cell = tr.querySelector(`[data-col="${col}"]`);
                if (!cell || cell.querySelector(".measure-check")) return;

                const numero = numeroCelda(tr, col);
                if (!Number.isFinite(numero)) return;
                if (!valores.some(esperado => coincideMedida(numero, esperado))) return;

                const check = document.createElement("span");
                check.className = "measure-check";
                check.title = "Medida coincidente";
                cell.appendChild(check);
            });
        }

        // Devuelve profundidad esperada segun tipo de mueble.
        function obtenerProfundidadEsperada(tipo) {
            // Usa la misma regla de profundidad de estructura que muestra el encabezado.
            return profundidadPorDefecto(tipo) || 580;
        }

        // Valida una pieza contra las medidas esperadas del modulo.
        function validarMedidasPieza(pieza, medida1, medida2, modulo) {
            const nombre = normalizarPieza(pieza);

            if (!Number.isFinite(medida1) || !Number.isFinite(medida2)) {
                return { ok: true, mensaje: "", valida: false };
            }

            if (esTpm(nombre)) {
                if (!modulo.anchoInterno || !modulo.profundidad) return { ok: true, mensaje: "", valida: false };

                const profundidadTpm = modulo.profundidad - 52;
                const ok = coincideParMedidas(medida1, medida2, modulo.anchoInterno, profundidadTpm);

                return {
                    ok,
                    mensaje: `deberia medir ${modulo.anchoInterno} x ${profundidadTpm} mm porque TPM descuenta 52 mm solo en esa pieza.`,
                    valida: true,
                    objetivos: [modulo.anchoInterno, profundidadTpm]
                };
            }

            if (esBaseConTiraderaInterna(nombre)) {
                if (!modulo.anchoInterno || !modulo.profundidad) return { ok: true, mensaje: "", valida: false };

                const profundidadBaseTi = modulo.profundidad - 22;
                const ok = coincideParMedidas(medida1, medida2, modulo.anchoInterno, profundidadBaseTi);

                return {
                    ok,
                    mensaje: `deberia medir ${modulo.anchoInterno} x ${profundidadBaseTi} mm porque la base con TI descuenta 22 mm de profundidad.`,
                    valida: true,
                    objetivos: [modulo.anchoInterno, profundidadBaseTi]
                };
            }

            if (esBaseOTecho(nombre)) {
                if (!modulo.anchoInterno || !modulo.profundidad) return { ok: true, mensaje: "", valida: false };

                const ok = coincideParMedidas(medida1, medida2, modulo.anchoInterno, modulo.profundidad);
                return {
                    ok,
                    mensaje: `deberia medir ${modulo.anchoInterno} x ${modulo.profundidad} mm segun ancho interno y profundidad.`,
                    valida: true,
                    objetivos: [modulo.anchoInterno, modulo.profundidad]
                };
            }

            if (esRepisaMovil(nombre)) {
                if (!modulo.anchoInterno || !modulo.profundidad) return { ok: true, mensaje: "", valida: false };

                const anchoRepisaMovil = modulo.anchoInterno - 1;
                const ok = coincideParMedidas(medida1, medida2, anchoRepisaMovil, modulo.profundidad);

                return {
                    ok,
                    mensaje: `deberia medir ${anchoRepisaMovil} x ${modulo.profundidad} mm porque REPM/REPMM descuenta 1 mm adicional de ancho.`,
                    valida: true,
                    objetivos: [anchoRepisaMovil, modulo.profundidad]
                };
            }

            if (esRepisaFija(nombre)) {
                if (!modulo.anchoInterno || !modulo.profundidad) return { ok: true, mensaje: "", valida: false };

                const ok = coincideParMedidas(medida1, medida2, modulo.anchoInterno, modulo.profundidad);

                return {
                    ok,
                    mensaje: `deberia medir ${modulo.anchoInterno} x ${modulo.profundidad} mm como repisa normal.`,
                    valida: true,
                    objetivos: [modulo.anchoInterno, modulo.profundidad]
                };
            }

            if (esAjuste(nombre)) {
                if (!modulo.anchoInterno) return { ok: true, mensaje: "", valida: false };

                const alturasAjuste = [60, 80, 100, 150];
                const ok = alturasAjuste.some(altura => coincideParMedidas(medida1, medida2, modulo.anchoInterno, altura));

                return {
                    ok,
                    mensaje: `deberia medir ${modulo.anchoInterno} x 60/80/100/150 mm.`,
                    valida: true,
                    objetivos: [modulo.anchoInterno, ...alturasAjuste]
                };
            }

            if (esPiezaDosDimensiones(nombre)) {
                if (!modulo.ancho || !modulo.alto) return { ok: true, mensaje: "", valida: false };

                const ok = coincideParMedidas(medida1, medida2, modulo.ancho, modulo.alto);
                return {
                    ok,
                    mensaje: `deberia medir ${modulo.ancho} x ${modulo.alto} mm segun ancho y alto del codigo.`,
                    valida: true,
                    objetivos: [modulo.ancho, modulo.alto]
                };
            }

            if (esLateral(nombre)) {
                if (!modulo.alto || !modulo.profundidad) return { ok: true, mensaje: "", valida: false };

                const ok = coincideParMedidas(medida1, medida2, modulo.alto, modulo.profundidad);
                return {
                    ok,
                    mensaje: `deberia medir ${modulo.alto} x ${modulo.profundidad} mm segun alto y profundidad del modulo.`,
                    valida: true,
                    objetivos: [modulo.alto, modulo.profundidad]
                };
            }

            if (esRespaldo(nombre)) {
                if (!modulo.ancho || !modulo.alto || !modulo.grosor) return { ok: true, mensaje: "", valida: false };

                const anchoRespaldo = modulo.ancho - (modulo.grosor * 2) + 10;
                const altoRespaldo = modulo.alto - (modulo.grosor * 2) + 10;
                const ok = coincideParMedidas(medida1, medida2, anchoRespaldo, altoRespaldo);

                return {
                    ok,
                    mensaje: `deberia medir ${anchoRespaldo} x ${altoRespaldo} mm, descontando dos espesores y sumando 5 mm por lado para ranura.`,
                    valida: true,
                    objetivos: [anchoRespaldo, altoRespaldo]
                };
            }

            return { ok: true, mensaje: "", valida: false };
        }

        // Extrae el grosor desde JOB/JOV en filas de base, techo o ajustes.
        function obtenerGrosorMaterialDesdeItems(items) {
            const candidatas = [];

            items.forEach(row => {
                const pieza = normalizarPieza(val(row, "cod_pieza"));
                if (!esPiezaQueDefineGrosorModulo(pieza)) return;

                const grosor = extraerGrosorMaterial(val(row, "jov"));
                if (grosor) candidatas.push(grosor);
            });

            return candidatas.find(grosor => grosor > 0) || 18;
        }

        // Extrae el grosor del material guardado en la tarjeta.
        function obtenerGrosorMaterialDesdeCard(card) {
            const grosor = Number.parseFloat(card.dataset.grosorMaterial || "");
            return Number.isFinite(grosor) && grosor > 0 ? grosor : 18;
        }

        // Extrae un numero de grosor desde codigos/materiales como CPCP18CO.
        function extraerGrosorMaterial(value) {
            const texto = String(value || "").toUpperCase();
            const match = texto.match(/(?:^|[^0-9])(\d{1,2}(?:[.,]\d+)?)(?=[A-Z]|[^0-9]|$)/);
            const grosor = match ? Number.parseFloat(match[1].replace(",", ".")) : 0;

            if (!Number.isFinite(grosor)) return 0;
            return grosor >= 3 && grosor <= 40 ? grosor : 0;
        }

        // Piezas cuyo JOB/JOV define el grosor general del modulo.
        function esPiezaQueDefineGrosorModulo(pieza) {
            return esBaseOTecho(pieza) || esAjuste(pieza);
        }

        // Normaliza nombres de piezas para detectar familias.
        function normalizarPieza(pieza) {
            return String(pieza || "")
                .toUpperCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/\s+/g, "")
                .trim();
        }

        // Detecta bases y techos.
        function esBaseOTecho(pieza) {
            return esBase(pieza) || esTecho(pieza);
        }

        // Detecta bases con codigos completos o abreviados, como BAS, BA o E-BAS-DEC-TI.
        function esBase(pieza) {
            const normal = normalizarPieza(pieza);
            const partes = normal.split("-").filter(Boolean);

            return normal.includes("BASE") ||
                normal.includes("BAS") ||
                partes.includes("BA") ||
                normal === "BA" ||
                normal.startsWith("BA-") ||
                normal.endsWith("-BA");
        }

        // Detecta techos con codigos completos o abreviados.
        function esTecho(pieza) {
            const normal = normalizarPieza(pieza);
            const partes = normal.split("-").filter(Boolean);

            return normal.includes("TECHO") ||
                normal.includes("TEC") ||
                partes.includes("TE") ||
                partes.includes("TCH") ||
                normal === "TE" ||
                normal === "TCH";
        }

        // Detecta bases con tiradera interna, como BAS-TI o E-BAS-DEC-TI.
        function esBaseConTiraderaInterna(pieza) {
            const normal = normalizarPieza(pieza);
            if (!esBase(normal) || esTecho(normal)) return false;

            return normal === "BAS-TI" ||
                normal === "BASTI" ||
                normal.endsWith("TI") ||
                normal.includes("-TI") ||
                normal.includes("TIRADERAINTERNA");
        }

        // Detecta ajustes AJ.
        function esAjuste(pieza) {
            const normal = normalizarPieza(pieza);
            const partes = normal.split("-").filter(Boolean);

            return normal.includes("AJUSTE") ||
                partes.some(parte => /^AJ[A-Z0-9]*$/.test(parte)) ||
                /^AJ[A-Z0-9]*$/.test(normal) ||
                /(?:^|[^A-Z])AJ[A-Z0-9]*$/.test(normal);
        }

        // Detecta laterales principales.
        function esLateral(pieza) {
            const normal = normalizarPieza(pieza);
            const partes = normal.split("-").filter(Boolean);

            return normal === "LID" ||
                normal === "LDD" ||
                normal === "LATI" ||
                normal === "LATD" ||
                normal === "LI" ||
                normal === "LD" ||
                normal.startsWith("LAT") ||
                normal.startsWith("LAD") ||
                normal.startsWith("LAI") ||
                normal.includes("LATERAL") ||
                partes.includes("LID") ||
                partes.includes("LDD") ||
                partes.includes("LATI") ||
                partes.includes("LATD") ||
                partes.includes("LI") ||
                partes.includes("LD");
        }

        // Detecta respaldos.
        function esRespaldo(pieza) {
            const normal = normalizarPieza(pieza);
            const partes = normal.split("-").filter(Boolean);

            return normal === "RES" ||
                normal.startsWith("RES-") ||
                normal.includes("RESP") ||
                normal.includes("RSP") ||
                normal.includes("FONDO") ||
                normal.includes("TRASERA") ||
                partes.includes("RES") ||
                /(?:^|[^A-Z])RES[A-Z0-9]*$/.test(normal);
        }

        // Detecta repisas moviles, que descuentan 1 mm adicional de ancho.
        function esRepisaMovil(pieza) {
            const normal = normalizarPieza(pieza);
            const partes = normal.split("-").filter(Boolean);

            return normal === "REPM" ||
                normal === "REPMM" ||
                partes.includes("REPM") ||
                partes.includes("REPMM") ||
                /(?:^|[^A-Z])REPMM?$/.test(normal);
        }

        // Detecta repisas normales o fijas sin confundirlas con repisas moviles.
        function esRepisaFija(pieza) {
            const normal = normalizarPieza(pieza);
            const partes = normal.split("-").filter(Boolean);

            if (esRepisaMovil(normal)) return false;

            return normal === "REP" ||
                normal === "REPISA" ||
                partes.includes("REP") ||
                partes.includes("REPISA") ||
                /(?:^|[^A-Z])REP$/.test(normal);
        }

        // Detecta piezas planas que solo necesitan ancho y alto, como forramientos FXTR.
        function esPiezaDosDimensiones(pieza) {
            const normal = normalizarPieza(pieza);
            const partes = normal.split("-").filter(Boolean);

            return normal.startsWith("FXTR") ||
                normal.startsWith("FBTR") ||
                normal.startsWith("FATR") ||
                normal.startsWith("FORR") ||
                normal.includes("FORRAMIENTO") ||
                partes.some(parte => parte.startsWith("FXTR") || parte.startsWith("FBTR") || parte.startsWith("FATR"));
        }

        // Detecta la pieza TPM, que tiene descuento propio de profundidad.
        function esTpm(pieza) {
            const normal = normalizarPieza(pieza);
            return normal === "TPM" || normal.includes("-TPM");
        }

        // Compara un par de medidas sin importar el orden en la tabla.
        function coincideParMedidas(medida1, medida2, esperado1, esperado2) {
            return (coincideMedida(medida1, esperado1) && coincideMedida(medida2, esperado2)) ||
                (coincideMedida(medida1, esperado2) && coincideMedida(medida2, esperado1));
        }

        // Muestra una medida o guion si no es numerica.
        function formatearMedida(valor) {
            return Number.isFinite(valor) ? String(valor) : "-";
        }

        // Detecta si una pieza debe validar ancho.
        function esPiezaDeAncho(pieza) {
            // Base, techo y ajustes suelen depender del ancho total.
            return pieza.includes("BASE") || pieza.includes("TECHO") || pieza.startsWith("AJ_");
        }

        // Detecta si una pieza debe validar profundidad.
        function esPiezaEstructural(pieza) {
            // Piezas estructurales principales.
            return pieza.startsWith("AJ_") || pieza.includes("BAS") || pieza.includes("TEC") || pieza.startsWith("LAT");
        }

        // Compara una medida con una esperada usando tolerancia.
        function coincideMedida(valor, esperado) {
            // Si el valor no es numerico, no coincide.
            if (!Number.isFinite(valor)) return false;

            // Devuelve true si esta dentro de la tolerancia.
            return Math.abs(valor - esperado) <= TOLERANCIA_MM;
        }

        // Obtiene texto de una celda segun su columna.
        function textoCelda(row, col) {
            // Busca la celda por data-col.
            const cell = row.querySelector(`[data-col="${col}"]`);

            // Devuelve texto limpio.
            return cell ? cell.textContent.trim() : "";
        }

        // Obtiene numero de una celda segun su columna.
        function numeroCelda(row, col) {
            // Lee texto de celda.
            const texto = textoCelda(row, col);

            // Cambia coma decimal por punto y convierte a numero.
            const numero = Number.parseFloat(texto.replace(",", "."));

            // Devuelve numero o NaN si no se pudo convertir.
            return Number.isFinite(numero) ? numero : NaN;
        }

        // Detecta ancho desde el codigo del mueble.
        function detectarAncho(cod) {
            // Normaliza el codigo.
            const codigo = String(cod || "").toUpperCase();

            // Busca letras iniciales completas seguidas del ancho, como B60, BS60 o BAR63.
            const match = codigo.match(/\b[A-Z]+(\d{2,3})/);

            // Si no encuentra, busca el primer numero de 2 o 3 digitos.
            const fallback = codigo.match(/(\d{2,3})/);

            // Toma el numero encontrado.
            const valor = match ? match[1] : fallback ? fallback[1] : "";

            // Si no hay numero, devuelve 0.
            if (!valor) return 0;

            // Convierte codigos tipo 60 a 600 mm y 120 a 1200 mm.
            return Number.parseInt(valor, 10) * 10;
        }

        // Construye texto de busqueda para los filtros universales.
        function construirTextoUniversal(op, cod, nombre, items) {
            // Une datos principales.
            const base = [op, cod, nombre].join(" ");

            // Une todos los valores de las filas.
            const filas = items.map(row => Object.values(row).join(" ")).join(" ");

            // Devuelve todo en mayusculas para comparar facil.
            return `${base} ${filas}`.toUpperCase();
        }

        // Actualiza contadores visibles.
        function actualizarStats(visibles, total, piezasVisibles = null, piezasTotal = null) {
            // Actualiza contador visible.
            document.getElementById("vis-count").textContent = String(visibles);

            // Actualiza contador total.
            document.getElementById("total-count").textContent = String(total);

            // Calcula piezas desde las tarjetas si no se enviaron valores.
            if (piezasVisibles === null || piezasTotal === null) {
                const contenedores = document.querySelectorAll(".mueble-container");
                piezasVisibles = 0;
                piezasTotal = 0;
                contenedores.forEach(div => {
                    const piezas = Number.parseInt(div.dataset.piezas, 10) || 0;
                    piezasTotal += piezas;
                    if (div.style.display !== "none") piezasVisibles += piezas;
                });
            }

            // Actualiza contador de piezas visible.
            document.getElementById("vis-piece-count").textContent = String(piezasVisibles);

            // Actualiza contador de piezas total.
            document.getElementById("total-piece-count").textContent = String(piezasTotal);
        }

        // Muestra avisos sobre columnas faltantes.
        function mostrarAvisosDeColumnas() {
            // Busca columnas requeridas que no se encontraron.
            const faltantes = COLS_REQUERIDAS.filter(col => !MAPA_COLUMNAS[col]);

            // Si no falta nada, oculta chip y termina.
            if (faltantes.length === 0) {
                chipWarnEl.style.display = "none";
                return;
            }

            // Muestra chip de advertencia.
            chipWarnEl.textContent = `Faltan columnas: ${faltantes.join(", ")}`;
            chipWarnEl.style.display = "";

            // Crea aviso completo.
            const notice = crearElemento("div", "notice", `Advertencia: no se encontraron estas columnas requeridas: ${faltantes.join(", ")}. La tabla se mostrara, pero la validacion puede quedar incompleta.`);

            // Inserta aviso.
            avisosEl.appendChild(notice);
        }

        // Limpia todos los avisos generales.
        function limpiarAvisos() {
            // Borra avisos.
            avisosEl.textContent = "";

            // Oculta chip de advertencia.
            chipWarnEl.style.display = "none";
        }

        // Muestra un error general en la zona de lista.
        function mostrarErrorGeneral(mensaje) {
            // Limpia la lista.
            listaEl.textContent = "";

            // Crea aviso visible.
            const errorBox = crearElemento("div", "notice", mensaje);

            // Inserta aviso.
            listaEl.appendChild(errorBox);
        }

        // Muestra estado vacio reutilizable.
        function mostrarEstadoVacio(titulo, texto) {
            // Limpia la lista.
            listaEl.textContent = "";

            // Crea contenedor vacio.
            const empty = crearElemento("div", "empty");

            // Crea titulo.
            const h3 = document.createElement("h3");
            h3.textContent = titulo;

            // Crea parrafo.
            const p = document.createElement("p");
            p.textContent = texto;

            // Une elementos.
            empty.appendChild(h3);
            empty.appendChild(p);
            listaEl.appendChild(empty);
        }

        // Crea un elemento HTML seguro con clase y texto opcionales.
        function crearElemento(tag, className = "", text = "") {
            // Crea el elemento indicado.
            const el = document.createElement(tag);

            // Agrega clases si existen.
            if (className) el.className = className;

            // Agrega texto seguro si existe.
            if (text) el.textContent = text;

            // Devuelve elemento listo.
            return el;
        }

        // Orden natural para mezclar texto y numeros de forma mas humana.
        function compararNatural(a, b) {
            // Usa comparacion local con sensibilidad numerica.
            return String(a).localeCompare(String(b), "es", { numeric: true, sensitivity: "base" });
        }
    </script>
