<script>
        const DB_NOMENCLATURA = {
            'ESTR-DES-A1': 'Estructura desayunador A1', 'ESTR-DES-A2': 'Estructura desayunador A2', 'ESTR-DES-B1': 'Estructura desayunador B1',
            'PM': 'Premesón tablero crudo', 'MES': 'Mesón', 'DIAM': 'Desayunador Diamante', 'GOTI-150P240': 'Desayunador Gota Izq 150x240',
            'GOTD-150P240': 'Desayunador Gota Der 150x240', 'MH': 'Módulo Microondas', 'HS': 'Horno Simple', 'HC': 'Horno Combinado',
            'HT': 'Horno Triple', 'DE': 'Despensa', 'DM': 'Despensa Múltiple', 'DEF': 'Despensa Fraccionada', 'AB-SIM': 'Abatible Simple',
            'AB-COM': 'Abatible Compás', 'AB-PLE': 'Abatible Plegable', 'MET': 'Estructura Metálica Loft', 'LIN': 'Line', 
            'CIL-CT': 'Cenefa de iluminación', 'PEL-CT': 'Perfil Superior tipo puerta', 'AU': 'Detalle Aurora', 'CT': 'Shaker 2.0',
            'TAPA': 'Tapa', 'REP': 'Repisa', 'LB': 'Lateral Bajo', 'LA': 'Lateral Alto', 'LX': 'Lateral Auxiliar', 'PG': 'Puerta Giratoria EXL'
        };

        // CORRECCIÓN: Búsqueda flexible por si el código de Excel trae texto extra (Ej: "B-HS-60")
        function obtenerNombre(cod) {
            if (!cod) return "Código vacío";
            let codigoLimpio = cod.toUpperCase().trim();
            
            // 1. Intento de coincidencia exacta
            if (DB_NOMENCLATURA[codigoLimpio]) {
                return DB_NOMENCLATURA[codigoLimpio];
            }
            
            // 2. Intento de coincidencia parcial
            for (let clave in DB_NOMENCLATURA) {
                if (codigoLimpio.includes(clave)) {
                    return DB_NOMENCLATURA[clave];
                }
            }
            
            return "Elemento no catalogado";
        }

        document.getElementById('upload').addEventListener('change', function(e) {
            let reader = new FileReader();
            reader.onload = (event) => {
                let wb = XLSX.read(new Uint8Array(event.target.result), {type: 'array'});
                let data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {raw:true});
                renderizar(data);
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function renderizar(data) {
            let lista = document.getElementById('lista');
            lista.innerHTML = "";
            let ops = [...new Set(data.map(r => r.op))];
            
            let htmlAcumulado = ""; // Optimización de rendimiento
            
            ops.forEach(op => {
                if (!op) return;
                htmlAcumulado += `<h1 class="op-title">OP: ${op}</h1>`;
                let mueblesEnOP = data.filter(r => r.op == op);
                let codigos = [...new Set(mueblesEnOP.map(r => r.cod_mueble))];
                
                codigos.forEach(cod => {
                    if (!cod) return;
                    let items = mueblesEnOP.filter(r => r.cod_mueble == cod);
                    let esEspecial = cod.toUpperCase().includes('ESP') || cod.toUpperCase().includes('ESPECIAL');
                    let nombreDescifrado = obtenerNombre(cod);
                    
                    // Extraer ancho latente para guardarlo en el dataset
                    let matchAncho = cod.match(/[A-Za-z](\d+)/);
                    let anchoCalculado = matchAncho ? parseInt(matchAncho[1]) * 10 : 0;
                    
                    // Concatenamos el contenido para búsqueda universal
                    let textoUniversal = (items.map(r => Object.values(r).join(' ')).join(' ') + " " + cod + " " + nombreDescifrado).toUpperCase();
                    
                    htmlAcumulado += `
                        <div class="mueble-container" data-ancho="${anchoCalculado}" data-universal="${textoUniversal}" data-codpuro="${cod}">
                            <span class="op-tag">OP: ${op}</span>
                            ${esEspecial ? '<span class="esp-tag">[MÓDULO ESPECIAL]</span>' : ''}
                            <h2><span class="cod-mueble-text">${cod}</span> <small style="color:#999; font-size:0.6em">(Fila C${(items[0].__rowNum__ || 0) + 2})</small></h2>
                            <span class="desc-tag">${nombreDescifrado}</span>
                            <table>
                                <tr><th>Tipo</th><th>Job</th><th>Pieza</th><th>Cant</th><th>M1</th><th>M2</th></tr>
                                ${items.map(r => `<tr>
                                    <td>${r['Tipo ']||r['Tipo']||''}</td><td>${r.job||''}</td><td class='pcod'>${r.cod_pieza||''}</td>
                                    <td>${r.cant_piezas||''}</td><td class='med1'>${r.medida1||0}</td><td class='med2'>${r.medida2||0}</td>
                                </tr>`).join('')}
                            </table>
                        </div>`;
                });
            });
            lista.innerHTML = htmlAcumulado;
        }

        function filtrarUniversal() {
            let filtros = Array.from(document.querySelectorAll('.f-input')).map(i => i.value.toUpperCase().trim()).filter(v => v !== "");
            document.querySelectorAll('.mueble-container').forEach(div => {
                div.style.display = filtros.every(f => div.dataset.universal.includes(f)) ? "" : "none";
            });
        }

        function validarTodo() {
            document.querySelectorAll('.mueble-container').forEach(div => {
                let error = false;
                div.classList.remove('err', 'ok'); // Limpiar estados anteriores
                
                // CORRECCIÓN: Leer el código puro desde el dataset para evitar el texto del tag <small>
                let codMueble = div.dataset.codpuro.toUpperCase();
                let tipo = codMueble[0]; 
                let anchoTotal = parseInt(div.dataset.ancho);
                
                // Definición de profundidades estándar según tipo de módulo
                let profEsperada = (tipo === 'A') ? 320 : (tipo === 'S') ? 530 : 580;

                div.querySelectorAll('tr').forEach((tr, index) => {
                    if(index === 0) return; // Ignorar la cabecera th
                    
                    let cellPieza = tr.cells[2];
                    if(!cellPieza) return;
                    
                    let p = cellPieza.innerText.toUpperCase();
                    let m1 = parseInt(tr.cells[4].innerText) || 0;
                    let m2 = parseInt(tr.cells[5].innerText) || 0;
                    let descuento = 37; 

                    // Validación de Anchos en Base y Techo
                    if (p.includes('BASE') || p.includes('TECHO') || p.includes('AJ_')) {
                        if (anchoTotal > 0 && m1 !== (anchoTotal - descuento) && m2 !== (anchoTotal - descuento)) {
                            error = true;
                        }
                    }
                    
                    // Validación de Profundidades en Laterales y Estructuras base
                    if (p.includes('AJ_') || p.includes('BAS') || p.includes('TEC') || p.startsWith('L')) {
                        if (m1 !== profEsperada && m2 !== profEsperada) {
                            error = true;
                        }
                    }
                });
                
                div.classList.add(error ? 'err' : 'ok');
            });
        }
    </script>
