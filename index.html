<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Validador de Despiece Completo - Madeval</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .header { background: var(--primary); color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .mueble-card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 8px; border-left: 10px solid #bdc3c7; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .mueble-card.especial { border-left-color: #e74c3c; }
        .esp-label { color: #e74c3c; font-weight: 800; font-size: 0.75em; text-transform: uppercase; }
        h2 { margin: 0; font-size: 1.2em; }
        .desc-text { font-size: 0.9em; color: #555; margin-bottom: 10px; display: block; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th { background: #f8f9fa; border: 1px solid #dee2e6; padding: 8px; text-align: left; }
        td { border: 1px solid #dee2e6; padding: 8px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Validador de Despiece Maestro</h1>
    <input type="file" id="upload" accept=".xlsx, .csv">
</div>
<div id="lista"></div>

<script>
    // Base de datos completa consolidada de tus archivos
    const NOMENCLATURA = {
        // Estructuras Mesones
        'ESTR-DES-A1': 'Estructura desayunador A1', 'ESTR-DES-A2': 'Estructura desayunador A2',
        'ESTR-DES-B1': 'Estructura desayunador B1', 'ESTR-DES-C1': 'Estructura desayunador C1',
        'SOP80': 'Soporte sobre mesón',
        // Mesones
        'PM': 'Premesón tablero crudo', 'MES': 'Mesón', 'DIAM': 'Desayunador Diamante',
        'GOTI-150P240': 'Desayunador Gota Izquierdo 150x240', 'GOTD-150P240': 'Desayunador Gota Derecho 150x240',
        // Módulos Horno/Auxiliares
        'MH': 'Módulo Microondas', 'HS': 'Horno Simple', 'HC': 'Horno Combinado', 'HT': 'Horno Triple',
        'DE': 'Despensa', 'DM': 'Despensa Múltiple', 'DEF': 'Despensa Fraccionada', 'PG': 'Puerta Giratoria EXL',
        // Complementos y Componentes
        'TAPA': 'Tapa', 'REP': 'Repisa', 'LB': 'Lateral Bajo', 'LA': 'Lateral Alto', 'LX': 'Lateral Auxiliar',
        'CIL-CT': 'Cenefa de iluminación', 'PEL-CT': 'Perfil Superior tipo puerta',
        'AB-SIM': 'Abatible Simple', 'AB-COM': 'Abatible Compás', 'AB-PLE': 'Abatible Plegable',
        '-PUSH': 'Puerta Push', '-LSP': 'Luz LED Spot', '-LBA': 'Luz LED Base', '-LSU': 'Luz LED Superior'
    };

    function obtenerDescripcion(cod) {
        if (!cod) return "Sin código";
        return NOMENCLATURA[cod] || "Componente estándar o personalizado";
    }

    document.getElementById('upload').addEventListener('change', function(e) {
        let reader = new FileReader();
        reader.onload = (ev) => {
            let data = XLSX.utils.sheet_to_json(XLSX.read(ev.target.result, {type: 'array'}).Sheets[0]);
            renderizar(data);
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function renderizar(data) {
        let lista = document.getElementById('lista');
        lista.innerHTML = "";
        data.forEach(r => {
            let cod = r.cod_mueble || "";
            let esEspecial = cod.toUpperCase().includes('ESP') || cod.toUpperCase().includes('ESPECIAL');
            
            let div = document.createElement('div');
            div.className = 'mueble-card' + (esEspecial ? ' especial' : '');
            div.innerHTML = `
                ${esEspecial ? '<span class="esp-label">[MÓDULO ESPECIAL]</span>' : ''}
                <h2>${cod}</h2>
                <span class="desc-text">${obtenerDescripcion(cod)}</span>
                <table>
                    <tr><th>Pieza</th><th>M1</th><th>M2</th></tr>
                    <tr><td>${r.cod_pieza || 'N/A'}</td><td>${r.medida1 || 0}</td><td>${r.medida2 || 0}</td></tr>
                </table>
            `;
            lista.appendChild(div);
        });
    }
</script>
</body>
</html>
